<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulsonic - Catálogo Retro-Moderno</title>
    <style>
        /* Variables y Reset */
        :root {
            --bg-color: #f7f7f7;
            --text-main: #111111;
            --text-muted: #666666;
            --accent-yellow: #fce300;
            --border-color: #e5e5e5;
            --card-bg: #ffffff;
            --radius: 12px;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            padding: 2rem;
        }

        /* Layout Principal */
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--text-main);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8rem;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: var(--bg-color);
            border-radius: 20px;
            padding: 0.5rem 1rem;
            width: 300px;
        }

        .search-bar input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            font-size: 0.9rem;
        }

        /* Contenido Grid */
        .content-grid {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 700px;
        }

        /* Sidebar Filtros */
        aside {
            padding: 2rem;
            border-right: 1px solid var(--border-color);
        }

        .filter-group {
            margin-bottom: 1.5rem;
        }

        .filter-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        select {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--card-bg);
            font-family: inherit;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .btn-clear {
            width: 100%;
            padding: 0.75rem;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 1rem;
            transition: all 0.2s;
        }
        
        .btn-clear:hover {
            background: var(--bg-color);
        }

        /* Main Catálogo */
        main {
            padding: 2rem;
        }

        .catalog-header {
            margin-bottom: 2rem;
        }

        .catalog-header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 2rem;
        }

        /* Tarjetas de Producto */
        .product-card {
            display: flex;
            flex-direction: column;
        }

        .cover-image {
            width: 100%;
            aspect-ratio: 1;
            background-color: var(--bg-color);
            border-radius: 8px;
            margin-bottom: 1rem;
            object-fit: cover;
            border: 1px solid var(--border-color);
        }

        .artist {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.2rem;
        }

        .title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .price {
            font-weight: 800;
            font-size: 1.1rem;
        }

        .condition-badge {
            background: var(--bg-color);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            border: 1px solid var(--border-color);
        }

    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo-area">
                <div class="logo-icon">P</div>
                Pulsonic
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Buscar discos, artistas, sellos...">
            </div>
        </header>

        <div class="content-grid">
            
            <aside>
                <div class="filter-group">
                    <label>Sello</label>
                    <select>
                        <option>Todos</option>
                        <option>Harvest</option>
                        <option>EMI</option>
                        <option>Modular</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Año de Prensa</label>
                    <select>
                        <option>Todos</option>
                        <option>1970s</option>
                        <option>1980s</option>
                        <option>2010s</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Estado de Conservación</label>
                    <div class="checkbox-group">
                        <label class="checkbox-item"><input type="checkbox"> NM</label>
                        <label class="checkbox-item"><input type="checkbox"> VG+</label>
                        <label class="checkbox-item"><input type="checkbox"> VG</label>
                        <label class="checkbox-item"><input type="checkbox"> G</label>
                    </div>
                </div>

                <div class="filter-group">
                    <label>Formato</label>
                    <div class="checkbox-group">
                        <label class="checkbox-item"><input type="checkbox" checked> Vinilo</label>
                        <label class="checkbox-item"><input type="checkbox"> Cassette</label>
                        <label class="checkbox-item"><input type="checkbox"> CD</label>
                    </div>
                </div>

                <button class="btn-clear">Limpiar filtros</button>
            </aside>

            <main>
                <div class="catalog-header">
                    <h1>Catálogo<br>Retro-Moderno</h1>
                </div>

                <div class="products-grid" id="catalog-container">
                    </div>
            </main>

        </div>
    </div>

    <script>
        const products = [
            {
                artist: "PINK FLOYD",
                title: "The Dark Side of the Moon",
                price: "$36.000",
                condition: "NM",
                img: "https://upload.wikimedia.org/wikipedia/en/3/3b/Dark_Side_of_the_Moon.png"
            },
            {
                artist: "KRAFTWERK",
                title: "Computer World",
                price: "$32.000",
                condition: "VG+",
                img: "https://upload.wikimedia.org/wikipedia/en/a/a6/Kraftwerk_-_Computer_World.png"
            },
            {
                artist: "TAME IMPALA",
                title: "Currents",
                price: "$38.000",
                condition: "NM",
                img: "https://upload.wikimedia.org/wikipedia/en/9/9b/Tame_Impala_-_Currents.png"
            },
            {
                artist: "KRAFTWERK",
                title: "The Man Machine",
                price: "$32.000",
                condition: "VG+",
                img: "https://upload.wikimedia.org/wikipedia/en/1/1b/Kraftwerk_-_The_Man-Machine.png"
            },
            {
                artist: "TAME IMPALA",
                title: "Innerspeaker",
                price: "$34.000",
                condition: "NM",
                img: "https://upload.wikimedia.org/wikipedia/en/e/ec/Tame_Impala_Innerspeaker.png"
            },
            {
                artist: "PINK FLOYD",
                title: "Wish You Were Here",
                price: "$36.000",
                condition: "VG+",
                img: "https://upload.wikimedia.org/wikipedia/en/b/b4/Pink_Floyd_-_Wish_You_Were_Here.png"
            }
        ];

        const catalogContainer = document.getElementById('catalog-container');

        // Función para renderizar el catálogo
        function renderCatalog() {
            catalogContainer.innerHTML = '';
            
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                
                card.innerHTML = `
                    <img src="${product.img}" alt="${product.title}" class="cover-image" onerror="this.src='data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22200%22%20height%3D%22200%22%20style%3D%22background%3A%23eee%22%3E%3C%2Fsvg%3E'">
                    <div class="artist">${product.artist}</div>
                    <div class="title">${product.title}</div>
                    <div class="price-row">
                        <span class="price">${product.price}</span>
                        <span class="condition-badge">${product.condition}</span>
                    </div>
                `;
                
                catalogContainer.appendChild(card);
            });
        }

        // Inicializar
        renderCatalog();
    </script>
</body>
</html>
